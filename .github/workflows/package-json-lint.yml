name: Package JSON Lint

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  package-json-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bunx npm-package-json-lint@9.0.0 .
